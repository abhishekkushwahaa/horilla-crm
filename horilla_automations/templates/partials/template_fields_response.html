{% load i18n %}
{% if show_mail_template %}
<div id="mail_template_container" class="flex flex-col" hx-swap-oob="outerHTML">
    <div class="flex justify-between items-center mb-1">
        <div class="flex justify-between mb-1 w-full">
            <label for="id_mail_template" class="text-xs text-color-600">
                {{ mail_template_label }}
            </label>
        </div>
    </div>
    <div class="relative">
        <select name="mail_template" id="id_mail_template" class="js-example-basic-single headselect">
            <option value="">---------</option>
            {% for template in mail_templates %}
            <option value="{{ template.pk }}"{% if template.pk == mail_template_id %} selected="selected"{% endif %}>{{ template.title }}</option>
            {% endfor %}
        </select>
    </div>
</div>
{% else %}
<div id="mail_template_container" style="display: none;" hx-swap-oob="outerHTML"></div>
{% endif %}
